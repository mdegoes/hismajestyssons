<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Crown &amp; Calling — Equipping men to live as kings under The King</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

<script src="theme.js"></script>

<style>
  :root {
    --paper: #F1ECE0;
    --paper-2: #E7E1D2;
    --ink: #0E0E0C;
    --ink-2: #2A2925;
    --muted: #6E685D;
    --rule: rgba(14,14,12,0.18);
    --accent: #8C2A1F;
    --on-accent: #F1ECE0;

    --pad-x: clamp(20px, 4vw, 72px);
    --pad-y: clamp(48px, 7vw, 120px);

    --display: "Baskerville", "Libre Baskerville", "Baskerville Old Face", Georgia, serif;
    --serif: "Baskerville", "Libre Baskerville", "Baskerville Old Face", Georgia, serif;
    --sans: "Baskerville", "Libre Baskerville", "Baskerville Old Face", Georgia, serif;
  }

  [data-scheme="ink"] {
    --paper: #0E0E0C;
    --paper-2: #1A1916;
    --ink: #F1ECE0;
    --ink-2: #D8D2C2;
    --muted: #8A857A;
    --rule: rgba(241,236,224,0.18);
    --on-accent: #F1ECE0;
  }

  [data-density="compact"] {
    --pad-y: clamp(32px, 5vw, 80px);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  ::selection { background: var(--accent); color: var(--on-accent); }

  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }

  /* ---------- Layout ---------- */
  .wrap { padding-left: var(--pad-x); padding-right: var(--pad-x); }
  .section { padding-top: var(--pad-y); padding-bottom: var(--pad-y); }

  /* ---------- Nav ---------- */
  .nav {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px var(--pad-x);
    background: color-mix(in oklab, var(--paper) 92%, transparent);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid transparent;
    transition: border-color .2s ease, padding .2s ease;
  }
  .nav[data-scrolled="true"] { border-bottom-color: var(--rule); padding-top: 12px; padding-bottom: 12px; }

  .mark {
    display: inline-flex; align-items: center; gap: 12px;
  }
  .mark .sigil {
    display: inline-block;
    line-height: 0;
  }
  .mark .sigil img { width: 100%; height: auto; display: block; }
  [data-scheme="ink"] .mark .sigil img { filter: invert(1); }

  .nav-links {
    display: flex; gap: 32px; align-items: center;
    font-family: var(--sans); font-size: 11px; letter-spacing: 0.24em;
    text-transform: uppercase; font-weight: 700;
  }
  .nav-links a {
    position: relative; padding: 6px 0;
  }
  .nav-links a::after {
    content: ""; position: absolute; left: 0; right: 100%; bottom: 0;
    height: 1px; background: var(--ink);
    transition: right .25s ease;
  }
  .nav-links a:hover::after { right: 0; }

  /* (nav CTA removed) */

  .nav-end { display: flex; align-items: center; gap: 20px; }

  /* ---------- Nav toggle (mobile hamburger) ---------- */
  .nav-toggle {
    display: none;
    align-items: center; justify-content: center;
    width: 32px; height: 32px; flex-shrink: 0;
    border-radius: 999px;
    border: 1px solid var(--rule);
    color: var(--ink);
    transition: border-color .15s ease;
  }
  .nav-toggle:hover { border-color: var(--ink); }
  .nav-toggle .bars { position: relative; display: block; width: 16px; height: 11px; }
  .nav-toggle .bars span {
    position: absolute; left: 0; right: 0; height: 1.5px; background: currentColor;
    transition: top .2s ease, transform .2s ease, opacity .2s ease;
  }
  .nav-toggle .bars span:nth-child(1) { top: 0; }
  .nav-toggle .bars span:nth-child(2) { top: 5px; }
  .nav-toggle .bars span:nth-child(3) { top: 10px; }
  .nav[data-menu-open="true"] .nav-toggle .bars span:nth-child(1) { top: 5px; transform: rotate(45deg); }
  .nav[data-menu-open="true"] .nav-toggle .bars span:nth-child(2) { opacity: 0; }
  .nav[data-menu-open="true"] .nav-toggle .bars span:nth-child(3) { top: 5px; transform: rotate(-45deg); }

  @media (max-width: 720px) {
    .nav-toggle { display: inline-flex; }
    .nav-links {
      display: flex; flex-direction: column; align-items: flex-start; gap: 2px;
      position: absolute; left: 0; right: 0; top: 100%;
      padding: 8px var(--pad-x) 24px;
      background: var(--paper);
      border-bottom: 1px solid var(--rule);
      opacity: 0; visibility: hidden; transform: translateY(-6px);
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease, visibility .2s ease;
    }
    .nav-links a { width: 100%; padding: 12px 0; }
    .nav-links a::after { display: none; }
    .nav[data-menu-open="true"] .nav-links {
      opacity: 1; visibility: visible; transform: translateY(0); pointer-events: auto;
    }
  }

  .theme-toggle {
    position: relative;
    display: inline-flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; flex-shrink: 0;
    border-radius: 999px;
    border: 1px solid var(--rule);
    color: var(--ink);
    transition: border-color .15s ease;
  }
  .theme-toggle:hover { border-color: var(--ink); }
  .theme-toggle svg { display: block; }
  .theme-toggle .icon-sun  { display: none; }
  .theme-toggle .icon-moon { display: block; }
  [data-scheme="ink"] .theme-toggle .icon-sun  { display: block; }
  [data-scheme="ink"] .theme-toggle .icon-moon { display: none; }

  .theme-toggle[data-tooltip]::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: calc(100% + 8px);
    right: 0;
    white-space: nowrap;
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--paper);
    background: var(--ink);
    padding: 5px 9px;
    border-radius: 2px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease;
  }
  .theme-toggle[data-tooltip]:hover::after { opacity: 1; }

  html.theme-ready body,
  html.theme-ready .nav,
  html.theme-ready .nav-links,
  html.theme-ready .theme-toggle {
    transition: background-color 0.25s ease, color 0.25s ease, border-color 0.25s ease;
  }

  /* ---------- Hero ---------- */
  .hero {
    display: grid;
    grid-template-columns: 1.15fr 0.85fr;
    gap: clamp(24px, 4vw, 56px);
    padding-top: clamp(48px, 6vw, 96px);
    padding-bottom: clamp(48px, 6vw, 96px);
    align-items: end;
  }
  @media (max-width: 900px) { .hero { grid-template-columns: 1fr; } }

  .hero-eyebrow {
    font-family: var(--sans); font-size: 11px; letter-spacing: 0.36em;
    text-transform: uppercase; color: var(--muted); font-weight: 700;
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 36px;
  }
  .hero-eyebrow::before {
    content: ""; width: 28px; height: 1px; background: var(--ink);
  }

  .hero-title {
    font-family: var(--display);
    font-size: clamp(48px, 7.5vw, 124px);
    line-height: 1.0;
    letter-spacing: -0.025em;
    margin: 0;
    color: var(--ink);
    font-weight: 400;
  }
  .hero-title em {
    font-style: italic; font-weight: 400;
    letter-spacing: -0.025em;
    color: var(--accent);
  }
  .hero-title .row { display: block; }

  .hero-actions {
    display: flex; flex-wrap: wrap; gap: 14px;
    margin-top: 40px;
  }
  .btn-primary, .btn-ghost {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 16px 26px;
    border-radius: 999px;
    font-family: var(--sans); font-size: 11px; letter-spacing: 0.24em;
    text-transform: uppercase; font-weight: 700;
    transition: transform .15s ease, background .15s ease, color .15s ease, border-color .15s ease;
    border: 1.5px solid var(--ink);
  }
  .btn-primary { background: var(--ink); color: var(--paper); }
  .btn-primary:hover { background: var(--accent); border-color: var(--accent); color: var(--on-accent); transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--rule); }
  .btn-ghost:hover { border-color: var(--ink); transform: translateY(-1px); }

  .hero-strap {
    margin-top: 36px;
    max-width: 40ch;
    font-family: var(--serif);
    font-size: clamp(18px, 1.5vw, 22px);
    line-height: 1.5;
    color: var(--ink-2);
    font-style: italic;
  }
  .hero-strap b { font-style: normal; font-weight: 700; }

  .hero-right {
    display: flex; flex-direction: column; gap: 20px;
    align-items: stretch;
  }

  .hero-photo {
    position: relative;
    aspect-ratio: 4/5;
    background: var(--paper-2);
    overflow: hidden;
    border-radius: 2px;
  }
  .hero-photo img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .photo-caption {
    position: absolute; left: 16px; right: 16px; bottom: 16px;
    font-family: var(--serif); font-style: italic; font-size: 14px;
    color: var(--ink-2);
  }

  .hero-meta {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 14px;
    padding-top: 18px;
    border-top: 1px solid var(--rule);
    font-family: var(--sans); font-size: 11px; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--muted); font-weight: 700;
  }
  .hero-meta strong {
    display: block;
    font-family: var(--display); font-weight: 400; font-style: italic;
    font-size: 36px; letter-spacing: -0.01em; color: var(--ink);
    margin-bottom: 4px;
  }

  /* ---------- Manifesto / Pillars ---------- */
  .manifesto-v2 {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: clamp(24px, 4vw, 80px);
    border-top: 1px solid var(--rule);
    padding-top: clamp(64px, 8vw, 120px);
  }
  @media (max-width: 720px) {
    .manifesto-v2 { grid-template-columns: 1fr; gap: 28px; }
  }
  .m-rail { position: sticky; top: 96px; align-self: start; padding-top: 14px; }
  @media (max-width: 720px) { .m-rail { position: static; padding-top: 0; } }
  .m-label {
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--muted);
    display: inline-flex; align-items: center; gap: 12px;
  }
  .m-label::before {
    content: ""; width: 28px; height: 1px; background: var(--ink);
  }

  .m-body {
    display: flex; flex-direction: column;
    gap: clamp(40px, 5vw, 72px);
    max-width: min(900px, 95%);
  }

  .m-statement {
    margin: 0;
    font-family: var(--display);
    font-size: clamp(44px, 6vw, 92px);
    line-height: 1.02;
    letter-spacing: -0.025em;
    color: var(--ink);
    font-weight: 400;
    text-wrap: balance;
  }
  .m-statement em {
    font-style: italic; font-weight: 400;
    color: var(--accent);
    letter-spacing: -0.03em;
  }

  .m-inscription {
    display: flex; flex-wrap: wrap;
    align-items: baseline;
    gap: clamp(14px, 1.6vw, 24px);
    padding: 22px 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    font-family: var(--display);
    font-size: clamp(22px, 2.2vw, 32px);
    line-height: 1;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .m-inscription .m-dot {
    color: var(--accent);
    font-style: italic;
    font-size: 1.1em;
    transform: translateY(-1px);
  }

  .m-creed {
    margin: 0;
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(20px, 1.8vw, 28px);
    line-height: 1.45;
    color: var(--ink-2);
    max-width: 34ch;
    text-wrap: pretty;
  }
  .m-creed .m-em {
    color: var(--accent);
    font-style: normal;
  }

  /* ---------- Footer ---------- */
  .foot {
    border-top: 1px solid var(--rule);
    padding: 28px var(--pad-x);
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
    font-family: var(--sans); font-size: 11px; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--muted); font-weight: 700;
  }
  .foot em { font-style: italic; font-weight: 400; letter-spacing: 0; text-transform: none; font-size: 14px; color: var(--ink-2); }
  .foot .links { display: flex; gap: 20px; }
  .foot .links a:hover { color: var(--ink); }

  /* ---------- Reveal (disabled) ---------- */
  .reveal { opacity: 1; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
